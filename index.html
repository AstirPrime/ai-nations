<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nations: Pixel Governors</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: #1e1e24;
            --border-col: #444;
            --text-main: #e0e0e0;
            --accent: #4ade80;
        }
        body {
            font-family: 'Press Start 2P', monospace;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            font-size: 10px;
        }
        /* CRT Scanline Effect */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            pointer-events: none;
        }
        .pixel-border {
            border: 4px solid var(--border-col);
            box-shadow: 4px 4px 0px #000;
        }
        .btn {
            background: #333;
            color: #fff;
            border: 2px solid #555;
            padding: 8px 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.1s;
        }
        .btn:hover { background: #444; border-color: #777; }
        .btn.active { background: var(--accent); color: #000; border-color: #fff; }
        .btn-play { background: #166534; border-color: #22c55e; }
        .btn-pause { background: #991b1b; border-color: #ef4444; }
        
        #map-canvas {
            image-rendering: pixelated;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #555; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative">

    <!-- Auth / Login Screen -->
    <div id="auth-screen" class="absolute inset-0 bg-black/90 z-50 flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-3xl text-green-400 mb-6 drop-shadow-[4px_4px_0_#000]">AI NATIONS SIMULATOR</h1>
        <p class="mb-8 text-gray-400 leading-relaxed max-w-2xl">
            Welcome to the automated political simulation.<br><br>
            4 AI Governors. 2 Continents. 1 Storyteller.<br>
            Every 10 years, they will forge laws, manage treaties, build infrastructure, and declare wars.
        </p>
        <button id="login-btn" class="btn text-xl px-6 py-4 animate-pulse">AUTHENTICATE VIA PUTER</button>
    </div>

    <!-- Error / Alert Overlay -->
    <div id="error-screen" class="hidden absolute inset-0 bg-red-900/90 z-50 flex flex-col items-center justify-center text-center p-8">
        <h1 class="text-3xl text-white mb-6">SIMULATION HALTED</h1>
        <p id="error-msg" class="mb-8 text-gray-200 leading-relaxed max-w-2xl"></p>
        <button onclick="document.getElementById('error-screen').classList.add('hidden')" class="btn text-xl">DISMISS</button>
    </div>

    <!-- Main UI -->
    <div class="flex flex-1 h-full w-full overflow-hidden">
        
        <!-- Map Area -->
        <div class="flex-1 bg-black relative p-4 flex flex-col">
            <div class="flex justify-between items-center mb-2 z-10 relative">
                <div>
                    <span class="text-green-400">YEAR: <span id="ui-year">1</span></span> | 
                    <span class="text-yellow-400" id="ui-status">RUNNING</span>
                </div>
                <div class="space-x-2 flex items-center" id="controls">
                    <button class="btn btn-play" id="btn-pause" onclick="togglePause()">PLAY</button>
                    <span class="text-gray-500 mx-2">|</span>
                    <button class="btn" id="btn-05x" onclick="setSpeed(0.5)">0.5x</button>
                    <button class="btn active" id="btn-1x" onclick="setSpeed(1)">1x</button>
                    <button class="btn" id="btn-2x" onclick="setSpeed(2)">2x</button>
                    <button class="btn" id="btn-5x" onclick="setSpeed(5)">5x</button>
                </div>
            </div>
            
            <div class="flex-1 pixel-border bg-[#111] overflow-hidden relative z-10">
                <canvas id="map-canvas" width="500" height="500"></canvas>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="w-96 bg-[#1e1e24] border-l-4 border-[#444] flex flex-col z-10 relative">
            <div class="p-4 border-b-4 border-[#444] bg-[#222]">
                <h2 class="text-center text-green-400 mb-2">WORLD STATS</h2>
                <div id="stats-container" class="space-y-4 overflow-y-auto max-h-64">
                    <!-- Stats injected via JS -->
                </div>
            </div>
            
            <div class="p-4 flex-1 flex flex-col min-h-0 bg-[#151515]">
                <h2 class="text-center text-yellow-400 mb-2">LIVE LOG</h2>
                <div id="log-container" class="flex-1 overflow-y-auto space-y-3 pr-2 text-[8px] leading-relaxed">
                    <div class="text-gray-500">System initialized...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- GAME CONSTANTS & STATE ---
        const TILE_SIZE = 10;
        const MAP_SIZE = 50; // 50x50 tiles
        const MODELS = ['deepseek-chat', 'deepseek-chat', 'gpt-4o-mini', 'gemini-3.5-flash'];
        const STORYTELLER_MODEL = 'gemini-3.5-flash';

        const STATE = {
            year: 1,
            speed: 1, 
            paused: true,
            awaitingAI: false,
            constitution: "",
            kingdomName: "",
            activeWars: [],
            pendingTreaties: [],
            districts: {
                D1: { id: 'D1', name: 'District 1', govName: '', capName: '', pop: 20, treasury: 50000, income: 10000, expense: 2000, happiness: 100, isIndependent: true, isCapital: false, color: 'rgba(255,255,0,0.3)', model: '', buildings: { docks: 0, councils: 0 } },
                D2: { id: 'D2', name: 'District 2', govName: '', capName: '', pop: 20, treasury: 50000, income: 10000, expense: 2000, happiness: 100, isIndependent: false, isCapital: true, color: 'rgba(255,0,0,0.3)', model: '', buildings: { docks: 0, councils: 0 } },
                D3: { id: 'D3', name: 'District 3', govName: '', capName: '', pop: 20, treasury: 50000, income: 10000, expense: 2000, happiness: 100, isIndependent: false, isCapital: false, color: 'rgba(0,255,0,0.3)', model: '', buildings: { docks: 0, councils: 0 } },
                D4: { id: 'D4', name: 'District 4', govName: '', capName: '', pop: 20, treasury: 50000, income: 10000, expense: 2000, happiness: 100, isIndependent: true, isCapital: false, color: 'rgba(0,0,255,0.3)', model: '', buildings: { docks: 0, councils: 0 } },
            },
            mapData: [] 
        };

        // --- AUTHENTICATION ---
        document.getElementById('login-btn').addEventListener('click', async () => {
            try {
                await puter.auth.signIn();
                document.getElementById('auth-screen').classList.add('hidden');
                startGame();
            } catch (err) {
                console.error("Auth error:", err);
                if (err.error === 'auth_window_closed' || (err.message && err.message.includes('closed'))) {
                    alert("Sign-in was cancelled. Please click authenticate to try again and play.");
                } else if (err.message && err.message.includes('popup')) {
                    alert("Popup blocked. Please allow popups to sign in to Puter.");
                } else {
                    alert("Authentication Failed: " + (err.message || "Unable to log in."));
                }
            }
        });

        // --- MAP GENERATION ---
        function generateMap() {
            for(let x=0; x<MAP_SIZE; x++) {
                STATE.mapData[x] = [];
                for(let y=0; y<MAP_SIZE; y++) {
                    STATE.mapData[x][y] = { type: 0, district: null, building: null };
                }
            }

            function addLandMass(cx, cy, radius, districtId, xMin, xMax, yMin, yMax) {
                for(let x=xMin; x<=xMax; x++) {
                    for(let y=yMin; y<=yMax; y++) {
                        if(x>=0 && x<MAP_SIZE && y>=0 && y<MAP_SIZE) {
                            let dx = x - cx;
                            let dy = y - cy;
                            let dist = Math.sqrt(dx*dx + (dy*dy * 1.1)); 
                            let noise = (Math.random() * 5) - 2.5; 
                            if (dist < radius + noise) STATE.mapData[x][y].district = districtId;
                        }
                    }
                }
            }

            // Continent 1: STRICTLY left side (x: 2 to 28)
            addLandMass(12, 10, 9, 'D4', 2, 28, 2, 48); // North
            addLandMass(20, 18, 8, 'D2', 2, 28, 2, 48); // East/Center
            addLandMass(12, 28, 9, 'D3', 2, 28, 2, 48); // South
            addLandMass(18, 38, 7, 'D3', 2, 28, 2, 48); // Deep South

            // Continent 2: STRICTLY right side (x: 34 to 48)
            addLandMass(42, 35, 7, 'D1', 34, 48, 2, 48);
            addLandMass(38, 42, 5, 'D1', 34, 48, 2, 48);

            // Smooth coastlines
            let tempMap = JSON.parse(JSON.stringify(STATE.mapData));
            for(let x=0; x<MAP_SIZE; x++) {
                for(let y=0; y<MAP_SIZE; y++) {
                    let landNeighbors = 0;
                    let districtCounts = {};

                    for(let nx = x-1; nx <= x+1; nx++) {
                        for(let ny = y-1; ny <= y+1; ny++) {
                            if(nx>=0 && nx<MAP_SIZE && ny>=0 && ny<MAP_SIZE) {
                                if(STATE.mapData[nx][ny].district !== null) {
                                    landNeighbors++;
                                    let d = STATE.mapData[nx][ny].district;
                                    districtCounts[d] = (districtCounts[d] || 0) + 1;
                                }
                            }
                        }
                    }

                    let dominantDistrict = null;
                    let maxCount = 0;
                    for (let d in districtCounts) {
                        if (districtCounts[d] > maxCount) {
                            maxCount = districtCounts[d];
                            dominantDistrict = d;
                        }
                    }

                    if (landNeighbors >= 5) tempMap[x][y].district = dominantDistrict;
                    else if (landNeighbors <= 3) tempMap[x][y].district = null;
                }
            }
            STATE.mapData = tempMap;

            // Biome Assignment
            for(let x=0; x<MAP_SIZE; x++) {
                for(let y=0; y<MAP_SIZE; y++) {
                    let cell = STATE.mapData[x][y];
                    if (cell.district !== null) {
                        let r = Math.random();
                        if (['D2', 'D3', 'D4'].includes(cell.district)) {
                            if (y < 15) cell.type = r > 0.4 ? 7 : 4; // Snow/Tundra
                            else if (y < 28) cell.type = x < 15 ? (r > 0.5 ? 6 : (r > 0.3 ? 1 : 3)) : (r > 0.4 ? 4 : 3);
                            else cell.type = x < 18 ? (r > 0.4 ? 1 : 3) : (r > 0.5 ? 4 : 3);
                        } else if (cell.district === 'D1') {
                            let distToCenter = Math.sqrt(Math.pow(x-40, 2) + Math.pow(y-38, 2));
                            if (distToCenter < 3) cell.type = 1; // Deep Desert
                            else if (x > 42) cell.type = r > 0.4 ? 4 : 3; // Forest/Plains
                            else cell.type = r > 0.6 ? 1 : 3; // Scrub
                        }
                        // Lakes & Rivers
                        if (cell.type !== 1 && cell.type !== 7 && cell.type !== 6) { 
                            if (Math.random() < 0.02) cell.type = 2; 
                            if (Math.random() < 0.04) cell.type = 5; 
                        }
                    } else cell.type = 0; 
                }
            }

            // Beach Pass (sand around water)
            for(let x=0; x<MAP_SIZE; x++) {
                for(let y=0; y<MAP_SIZE; y++) {
                    let cell = STATE.mapData[x][y];
                    if (cell.district !== null && cell.type !== 7 && cell.type !== 6) {
                        let touchesWater = false;
                        for(let nx = x-1; nx <= x+1; nx++) {
                            for(let ny = y-1; ny <= y+1; ny++) {
                                if(nx>=0 && nx<MAP_SIZE && ny>=0 && ny<MAP_SIZE && STATE.mapData[nx][ny].type === 0) {
                                    touchesWater = true;
                                }
                            }
                        }
                        if (touchesWater && Math.random() > 0.1) cell.type = 8; // Beach
                    }
                }
            }
            drawMap();
        }

        function placeBuilding(distId, bType) {
            let candidates = [];
            for(let x=0; x<MAP_SIZE; x++) {
                for(let y=0; y<MAP_SIZE; y++) {
                    if(STATE.mapData[x][y].district === distId && !STATE.mapData[x][y].building) {
                        if (bType === 'dock') {
                            if (STATE.mapData[x][y].type === 8) candidates.push({x,y}); // Docks on beaches
                        } else if (bType === 'council') {
                            if (STATE.mapData[x][y].type !== 0 && STATE.mapData[x][y].type !== 6 && STATE.mapData[x][y].type !== 8) {
                                candidates.push({x,y}); // Councils inland
                            }
                        }
                    }
                }
            }
            if (candidates.length > 0) {
                let spot = candidates[Math.floor(Math.random() * candidates.length)];
                STATE.mapData[spot.x][spot.y].building = bType;
                if (bType === 'dock') STATE.districts[distId].buildings.docks++;
                if (bType === 'council') STATE.districts[distId].buildings.councils++;
            }
        }

        function drawMap() {
            const canvas = document.getElementById('map-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const colors = {
                0: '#1a365d', // Water
                1: '#b45309', // Desert
                2: '#0284c7', // Lake
                3: '#4d7c0f', // Plains
                4: '#14532d', // Forest
                5: '#0ea5e9', // River
                6: '#57534e', // Mountain
                7: '#e2e8f0', // Snow/Tundra
                8: '#fde047', // Beach Sand
            };

            for(let x=0; x<MAP_SIZE; x++) {
                for(let y=0; y<MAP_SIZE; y++) {
                    let tile = STATE.mapData[x][y];
                    
                    // Terrain
                    ctx.fillStyle = colors[tile.type];
                    ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);

                    // District Overlay
                    if (tile.district) {
                        ctx.fillStyle = STATE.districts[tile.district].color;
                        ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    }

                    // Buildings
                    if (tile.building) {
                        ctx.fillStyle = tile.building === 'dock' ? '#78350f' : '#f8fafc';
                        ctx.fillRect((x * TILE_SIZE) + 2, (y * TILE_SIZE) + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                    }
                }
            }

            // Capital Labels
            ctx.fillStyle = '#fff';
            ctx.font = '10px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'black';
            
            const drawLabel = (text, x, y) => {
                ctx.strokeText(text, x * TILE_SIZE, y * TILE_SIZE);
                ctx.fillText(text, x * TILE_SIZE, y * TILE_SIZE);
            };

            drawLabel(STATE.districts.D1.capName || "Cap 1", 41, 38);
            drawLabel(STATE.districts.D2.capName || "Cap 2", 20, 20);
            drawLabel(STATE.districts.D3.capName || "Cap 3", 16, 32);
            drawLabel(STATE.districts.D4.capName || "Cap 4", 15, 12);
        }

        // --- UTILS & UI ---
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function addLog(text, type='info') {
            const logBox = document.getElementById('log-container');
            const el = document.createElement('div');
            
            let color = 'text-gray-300';
            if (type === 'action') color = 'text-blue-400';
            if (type === 'system') color = 'text-yellow-400';
            if (type === 'alert') color = 'text-red-400';
            if (type === 'success') color = 'text-green-400';

            el.className = `p-2 bg-black/50 border border-gray-800 rounded ${color}`;
            el.innerHTML = `[Yr ${Math.floor(STATE.year)}] ${text}`;
            logBox.appendChild(el);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function togglePause() {
            STATE.paused = !STATE.paused;
            if (!STATE.paused) lastTime = performance.now(); // Fix DT jump
            updateSpeedUI();
        }

        function setSpeed(s) {
            STATE.speed = s;
            if (STATE.paused) togglePause();
            else updateSpeedUI();
        }

        function updateSpeedUI() {
            const btnPause = document.getElementById('btn-pause');
            btnPause.innerText = STATE.paused ? "PLAY" : "PAUSE";
            btnPause.className = `btn ${STATE.paused ? 'btn-play' : 'btn-pause'}`;
            
            ['05x', '1x', '2x', '5x'].forEach(spd => {
                document.getElementById(`btn-${spd}`).classList.remove('active');
            });
            
            if (STATE.speed === 0.5) document.getElementById('btn-05x').classList.add('active');
            if (STATE.speed === 1) document.getElementById('btn-1x').classList.add('active');
            if (STATE.speed === 2) document.getElementById('btn-2x').classList.add('active');
            if (STATE.speed === 5) document.getElementById('btn-5x').classList.add('active');
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('ui-year').innerText = Math.floor(STATE.year);
            document.getElementById('ui-status').innerText = STATE.awaitingAI ? "AI PROCESSING..." : (STATE.paused ? "PAUSED" : "RUNNING");
            
            let statsHtml = '';
            for(let key in STATE.districts) {
                let d = STATE.districts[key];
                
                // Determine War/Treaty tags visually
                let isAtWar = STATE.activeWars.some(w => w.attacker === d.id || w.defender === d.id);
                let warTag = isAtWar ? `<span class="text-red-500 animate-pulse">[WAR]</span>` : "";
                let hasPending = STATE.pendingTreaties.some(t => t.to === d.id);
                let treatyTag = hasPending ? `<span class="text-blue-300">[PND TTY]</span>` : "";

                statsHtml += `
                    <div class="text-[8px] bg-[#111] p-2 border border-[#333]">
                        <div class="text-white mb-1 flex justify-between">
                            <span>${d.name} <span class="text-gray-500">(${d.model.substring(0,6)})</span></span>
                            <span>${warTag} ${treatyTag}</span>
                        </div>
                        <div class="text-gray-400">Gov: <span class="text-green-300">${d.govName || '?'}</span></div>
                        <div class="text-gray-400">Cap: <span class="text-yellow-300">${d.capName || '?'}</span></div>
                        <div class="grid grid-cols-2 gap-1 mt-1">
                            <div>Pop: ${Math.floor(d.pop)}</div>
                            <div>Hpy: ${Math.floor(d.happiness)}%</div>
                            <div>Inc: $${Math.floor(d.income/1000)}k</div>
                            <div>Exp: $${Math.floor(d.expense/1000)}k</div>
                            <div class="col-span-2 text-cyan-500 mt-1">Bldgs: ${d.buildings.docks} Docks, ${d.buildings.councils} Councils</div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('stats-container').innerHTML = statsHtml;
        }

        function showError(msg) {
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('error-screen').classList.remove('hidden');
            STATE.paused = true;
            updateSpeedUI();
            STATE.awaitingAI = false;
            updateUI();
        }

        // --- AI INTERFACE ---
        async function askAI(prompt, model) {
            try {
                const resp = await puter.ai.chat(prompt, { model: model, stream: false });
                return resp?.message?.content || resp?.text || resp?.toString();
            } catch (err) {
                console.error("AI Request Failed:", err);
                showError("Puter API Error: You may be out of credits, rate-limited, or the model is currently unavailable. \n\nDetails: " + err.message);
                throw err;
            }
        }

        function cleanJSON(text) {
            if(!text) return null;
            try {
                let s = text.trim();
                let match = s.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
                if (match) return JSON.parse(match[0]);
                return JSON.parse(s);
            } catch (e) {
                console.error("JSON parse error:", text);
                return null;
            }
        }

        // --- GAME LOGIC ---
        async function startGame() {
            generateMap();
            addLog("Assigning AI Governors...", "system");
            
            let shuffledModels = shuffle([...MODELS]);
            STATE.districts.D1.model = shuffledModels[0];
            STATE.districts.D2.model = shuffledModels[1];
            STATE.districts.D3.model = shuffledModels[2];
            STATE.districts.D4.model = shuffledModels[3];

            updateUI();
            STATE.awaitingAI = true;

            try {
                for (const d of Object.values(STATE.districts)) {
                    await initDistrict(d);
                    await new Promise(res => setTimeout(res, 1000));
                }

                addLog(`Kingdom formed: ${STATE.kingdomName}. Constitution enacted!`, "success");
                addLog("Simulation starting...", "system");
                
                STATE.awaitingAI = false;
                STATE.paused = false;
                lastTime = performance.now();
                updateSpeedUI();
                requestAnimationFrame(gameLoop);

            } catch (err) {
                // Handled in askAI
            }
        }

        async function initDistrict(d) {
            let prompt = `You are an AI governing ${d.name} in a pixelated simulation. `;
            if(d.id === 'D2') {
                prompt += `You are the SUPREME GOVERNOR. You rule District 2 and 3 as a unified nation. District 1 and 4 are independent. 
                You must name yourself, your capital city, invent a name for your unified Kingdom, and write a 2-sentence foundational Constitution.
                Return ONLY valid JSON format: { "govName": "...", "capName": "...", "kingdomName": "...", "constitution": "..." }`;
            } else {
                prompt += `You must name yourself and your capital city. Return ONLY valid JSON format: { "govName": "...", "capName": "..." }`;
            }

            const response = await askAI(prompt, d.model);
            const data = cleanJSON(response);

            if(data) {
                d.govName = data.govName || "Unknown";
                d.capName = data.capName || "Unknown City";
                if(d.id === 'D2') {
                    STATE.kingdomName = data.kingdomName || "The United Realm";
                    STATE.constitution = data.constitution || "We shall rule peacefully.";
                }
                addLog(`${d.id} Governor ${d.govName} established ${d.capName}.`, "info");
            } else {
                throw new Error("Failed to parse init JSON from " + d.id);
            }
        }

        let lastTime = 0;
        let yearProgress = 0;

        function gameLoop(time) {
            if (!STATE.paused && !STATE.awaitingAI) {
                let dt = (time - lastTime) / 1000; 
                let yearsPerSec = STATE.speed;
                
                yearProgress += dt * yearsPerSec;
                
                if (yearProgress >= 1) {
                    let increments = Math.floor(yearProgress);
                    yearProgress -= increments;
                    
                    for(let i=0; i<increments; i++) {
                        processYear();
                    }
                }
            }
            
            lastTime = time;
            drawMap();
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function processYear() {
            STATE.year++;
            
            // War continuous penalties
            STATE.activeWars.forEach(w => {
                if (STATE.districts[w.attacker]) {
                    STATE.districts[w.attacker].pop -= 0.2;
                    STATE.districts[w.attacker].happiness -= 1;
                    STATE.districts[w.attacker].treasury -= 500;
                }
                if (STATE.districts[w.defender]) {
                    STATE.districts[w.defender].pop -= 0.2;
                    STATE.districts[w.defender].happiness -= 1;
                    STATE.districts[w.defender].treasury -= 500;
                }
            });

            // Yearly passive stats update
            for(let key in STATE.districts) {
                let d = STATE.districts[key];
                
                // Building Modifiers
                let popGrowth = 0.25 * (d.happiness / 100);
                popGrowth += (d.buildings.councils * 0.05); // Councils aid population management
                d.pop += popGrowth;
                
                let extraIncome = d.buildings.docks * 2500; // Docks aid trade
                
                d.treasury += (d.income + extraIncome - d.expense);
                if (d.treasury < 0) {
                    d.treasury = 0;
                    d.happiness -= 1; // Debt penalty
                }
                if (d.happiness > 100) d.happiness = 100;
                if (d.happiness < 0) d.happiness = 0;
            }

            // 10-Year Epoch
            if (STATE.year % 10 === 0) {
                triggerAIPhase();
            }
        }

        async function triggerAIPhase() {
            STATE.awaitingAI = true;
            addLog(`--- 10 YEAR EPOCH REACHED ---`, "system");
            
            const simState = {
                year: STATE.year,
                kingdom: STATE.kingdomName,
                constitution: STATE.constitution,
                activeWars: STATE.activeWars,
                districts: {}
            };
            
            for(let k in STATE.districts) {
                let d = STATE.districts[k];
                simState.districts[k] = {
                    gov: d.govName, pop: Math.floor(d.pop), happiness: Math.floor(d.happiness),
                    treasury: Math.floor(d.treasury), isIndep: d.isIndependent,
                    buildings: d.buildings
                };
            }
            const stateStr = JSON.stringify(simState);

            try {
                const actions = [];
                for (const d of Object.values(STATE.districts)) {
                    
                    // Filter pending treaties where this district is the target
                    let relevantTreaties = STATE.pendingTreaties.filter(t => t.to === d.id);
                    let pendingStr = relevantTreaties.length > 0 ? `Pending Treaties needing your approval: ${JSON.stringify(relevantTreaties)}` : "No pending treaties.";
                    
                    let prompt = `You are ${d.govName}, Governor of ${d.id}. Current State: ${stateStr}.
                    ${pendingStr}
                    Choose EXACTLY 1 action. Allowed actionType values: 
                    "law" (pass general rule), 
                    "letter" (send message), 
                    "declare_war" (targetId required, initiates war), 
                    "propose_treaty" (targetId required, offers peace/trade), 
                    "accept_treaty" (targetId required, accepts their proposal and ends wars between you), 
                    "build_dock" (boosts income, targetId null), 
                    "build_council" (boosts population growth, targetId null).
                    
                    Return ONLY valid JSON:
                    {
                        "actionType": "law|letter|declare_war|propose_treaty|accept_treaty|build_dock|build_council",
                        "targetId": "D1|D2|D3|D4 or null",
                        "content": "Short description of the action"
                    }`;
                    
                    let resp = await askAI(prompt, d.model);
                    actions.push({ district: d.id, ...cleanJSON(resp) });
                    await new Promise(res => setTimeout(res, 1000));
                }
                
                // Process technical actions first
                actions.forEach(a => {
                    if(!a || !a.actionType) return;
                    if(a.content) addLog(`[${a.district} ACTION] ${a.actionType.toUpperCase()}: ${a.content}`, "action");

                    if (a.actionType === 'propose_treaty' && a.targetId) {
                        STATE.pendingTreaties.push({from: a.district, to: a.targetId, content: a.content});
                    }
                    if (a.actionType === 'accept_treaty' && a.targetId) {
                        STATE.pendingTreaties = STATE.pendingTreaties.filter(t => !(t.from === a.targetId && t.to === a.district));
                        // End wars between them
                        STATE.activeWars = STATE.activeWars.filter(w => !( (w.attacker === a.targetId && w.defender === a.district) || (w.defender === a.targetId && w.attacker === a.district) ));
                        addLog(`Treaty accepted between ${a.district} and ${a.targetId}! Wars ended.`, "success");
                    }
                    if (a.actionType === 'declare_war' && a.targetId && a.targetId !== a.district) {
                        let exists = STATE.activeWars.find(w => (w.attacker === a.district && w.defender === a.targetId) || (w.defender === a.district && w.attacker === a.targetId));
                        if (!exists) {
                            STATE.activeWars.push({attacker: a.district, defender: a.targetId});
                            addLog(`WAR DECLARED by ${a.district} against ${a.targetId}!`, "alert");
                        }
                    }
                    if (a.actionType === 'build_dock') {
                        placeBuilding(a.district, 'dock');
                        addLog(`${a.district} constructed a new Dock.`, "info");
                    }
                    if (a.actionType === 'build_council') {
                        placeBuilding(a.district, 'council');
                        addLog(`${a.district} constructed a City Council.`, "info");
                    }
                });

                // Storyteller validation
                addLog(`Storyteller processing outcomes...`, "system");
                let stPrompt = `You are the Simulation Storyteller. Review these 10-year actions: ${JSON.stringify(actions)}.
                Active Wars: ${JSON.stringify(STATE.activeWars)}.
                Determine the narrative outcome and stat modifiers.
                Return ONLY valid JSON matching this exact structure:
                {
                    "summary": "1-2 sentence narrative summary",
                    "modifiers": {
                        "D1": { "popMod": 0, "hapMod": 0, "incMod": 0, "expMod": 0 },
                        "D2": { "popMod": 0, "hapMod": 0, "incMod": 0, "expMod": 0 },
                        "D3": { "popMod": 0, "hapMod": 0, "incMod": 0, "expMod": 0 },
                        "D4": { "popMod": 0, "hapMod": 0, "incMod": 0, "expMod": 0 }
                    }
                }`;

                const stResp = await askAI(stPrompt, STORYTELLER_MODEL);
                const stData = cleanJSON(stResp);

                if (stData && stData.modifiers) {
                    addLog(`[STORYTELLER] ${stData.summary}`, "success");
                    for(let k in stData.modifiers) {
                        let m = stData.modifiers[k];
                        if (STATE.districts[k]) {
                            STATE.districts[k].pop += (m.popMod || 0);
                            STATE.districts[k].happiness += (m.hapMod || 0);
                            STATE.districts[k].income += (m.incMod || 0);
                            STATE.districts[k].expense += (m.expMod || 0);
                        }
                    }
                } else {
                    addLog("[STORYTELLER] Failed to parse consequences.", "alert");
                }

            } catch(e) {
                // Handled in askAI, error overlay shown.
            }

            STATE.awaitingAI = false;
        }

    </script>
